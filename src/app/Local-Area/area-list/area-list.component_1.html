<app-header>
</app-header>
<div>
    <app-sidebar>
    </app-sidebar>
</div>
<div class="container-fluid content" style="background-color: #F1F3F6;">
    <div class="row py-1 ">
        <div class="col-11 px-xl-0 px-lg-0 px-md-0 px-2 ms-5">
            <div class="container-fluid">
                <div class="row mt-3 py-2 ">
                    <div class="col-lg-10 col-8">
                        <p class="mb-0 breadCrumbTopic">Area</p>
                        <p class="mb-0">
                            <span>
                                <img src="assets/images/common/Icon ionic-md-home@2x.webp" width="11.2px"
                                    class="me-2 mb-1">
                            </span>
                            <span class="breadCrumbSubTopic">Pincode </span>
                        </p>

                    </div>
                    
                </div>
                <div class="row mt-4">                   
                    <div class="col">
                        <app-search-box [placeHolder]="'Search Pincode'" (onSearchValue)="search($event)">
                        </app-search-box>
                    </div>
                    <div class="col-3 offset-3">
                        <button type="button" class="form-control show_Results" (click)="routeToAdd()"
                        ><span class="">Add Area</span></button>
                    </div>
                </div>         

                <div class="row" >
                    <div class="col" *ngIf="modifiedCategoriesData">
                        <app-generic-table [productsList]="modifiedCategoriesData" [tableHeader]="tableHeader" [tableBodyHeader]="tableBodyHeader" [pageDetails]="pageDetails" (updateCAll)="refresh()" (updatePageEmitter)="nextPage($event)" (openModal)="op($event)" (actionEmitter)="action($event)"></app-generic-table>
                    </div>
                </div>
                

            </div>

        </div>
    </div>

</div>
