<app-header>
</app-header>
<div>
    <app-sidebar>
    </app-sidebar>
</div>
<div class="container-fluid content" style="background-color: #F1F3F6;">
    <div class="row py-1 ">
        <div class="col-11 px-xl-0 px-lg-0 px-md-0 px-2 ms-5">
            <div class="container-fluid">
                <div class="row mt-3 py-2 ">
                    <div class="col-lg-10 col-8">
                        <app-heading [heading]="'Area'"></app-heading> 
                        <p class="mb-0">
                            <span>
                                <img src="assets/images/common/Icon ionic-md-home@2x.webp" width="11.2px"
                                    class="me-2 mb-1">
                            </span>
                            <span class="breadCrumbSubTopic">Pincode </span>
                        </p>

                    </div>

                </div>
                <div class="row mt-4">
                    <div class="col">
                        <div class="row">
                            <div class="col mx-auto">
                                <form class=" mt-3 mb-5 needs-validation" autocomplete="off" [formGroup]="form1">
                                    <div class="row">

                                        <div class="col-md-6 col-12 mb-3">
                                            <label for="validationCustom02" class="form-label">Area</label>
                                            <input type="text" formControlName="area" class="form-control"
                                                [ngClass]="{ 'is-invalid': submitted  && areaCheck['area'].errors }"
                                                placeholder="Enter Area Name" [(ngModel)]="area.area">
                                        </div>

                                        <div class="col-md-6 col-12 mb-3">
                                            <label for="validationCustom02" class="form-label">Area ID</label>
                                            <input type="text" formControlName="areaId" class="form-control" readonly                          
                                                placeholder="Area Id" [(ngModel)]="area.areaId">
                                        </div>

                                        <div class="col-md-6 col-12 mb-3">
                                            <label for="validationCustom01" class="form-label">Pin Code</label>
                                            <input type="text" formControlName="pinCode" class="form-control"
                                                [ngClass]="{ 'is-invalid': submitted  && areaCheck['pinCode'].errors }"
                                                placeholder="Enter Pin Code" [(ngModel)]="area!.pinCode">
                                            <div *ngIf="submitted && areaCheck['pinCode'].errors"
                                                class="invalid-feedback">
                                                <div *ngIf="areaCheck['pinCode'].errors['required']">Pin Code is
                                                    required</div>
                                            </div>
                                        </div>
                                 


                                    </div>
                                    <div class="row">
                                        <div class="col-md-6 col mb-3 offset-md-6 offset-0">

                                            <div class="row">
                                                <div class="col-md">
                                                    <button class="btn w-100 float-end checkOut"
                                                        (click)="proceed()">Proceed</button>
                                                </div>
                                            </div>
                                        </div>

                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>
