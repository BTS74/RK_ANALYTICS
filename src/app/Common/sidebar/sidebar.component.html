<div class="sidebar d-md-block d-none">
    <!-- Logo -->
    <div class="logo Soligant text-center">
        RK Pattarai
    </div>

    <!-- Navigation items -->
    <nav class="sidebar-nav">
        <a routerLink="/home" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }"
            class="sidebar-item active" [ngClass]="{'active':getCurrentRoute() === '/home'}">
            <div class="icon-container">
                <img [src]="'assets/images/sideBar/' + (getCurrentRoute() === '/home' ? 'Icon feather-home@2x-white.webp' : 'Icon feather-home@2x.webp')"
                    alt="mdo" width="25">
            </div>
            <span class="label">Dashboard</span>
        </a>

        <a routerLink="/charges" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }"
            class="sidebar-item" [ngClass]="{'active':getCurrentRoute() === '/charges'}">
            <div class="icon-container">
                <img [src]="'assets/images/sideBar/' + (getCurrentRoute() === '/charges' ? 'payment-white.webp' : 'payment.webp')"
                    alt="mdo" width="25">
            </div>
            <span class="label">Charges</span>
        </a>

        <a routerLink="/order" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: false }"
            class="sidebar-item" [ngClass]="{'active':isOrderRoute('/order')}">
            <div class="icon-container">
                <img [src]="isOrderRoute('/order') ? 
        'assets/images/sideBar/payment-white.webp' : 
        'assets/images/sideBar/payment.webp'" width="25" />
            </div>
            <span class="label">Orders</span>
        </a>

        <a routerLink="/manual-payments" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: false }"
            class="sidebar-item" [ngClass]="{'active':isOrderRoute('/manual-payments')}">
            <div class="icon-container">
                <img [src]="isOrderRoute('/manual-payments') ? 
        'assets/images/sideBar/payment-white.webp' : 
        'assets/images/sideBar/payment.webp'" width="25" />
            </div>
            <span class="label">Manual Payments</span>
        </a>

        
        <a routerLink="/invoice-manager" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: false }"
            class="sidebar-item" [ngClass]="{'active':isOrderRoute('/invoice-manager')}">
            <div class="icon-container">
                <img [src]="isOrderRoute('/invoice-manager') ? 
        'assets/images/sideBar/payment-white.webp' : 
        'assets/images/sideBar/payment.webp'" width="25" />
            </div>
            <span class="label">Invoice</span>
        </a>


        <!-- More sidebar items -->
    </nav>

</div>
