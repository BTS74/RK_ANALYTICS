<!-- Button trigger modal -->
<button type="button" class="btn btn-primary d-none" id="generic-modal" data-bs-toggle="modal" data-bs-target="#exampleModal">
    Launch demo modal
  </button>

<!-- Modal -->
<div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-dialog modal-xl">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="exampleModalLabel">{{heading}}</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body" style="overflow: auto;">
                <app-generic-table [productsList]="productsList" [tableHeader]="tableHeader" [tableBodyHeader]="tableBodyHeader" [pageDetails]="pageDetails" (updateCAll)="refresh()" (updatePageEmitter)="nextPage($event)"></app-generic-table>
            </div>

        </div>
    </div>
</div>
